<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stitch Mejorado en la Playa Tropical</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="escena-playa">
        <div class="sol"></div>
        <div class="nube uno"></div>
        <div class="nube dos"></div>
        <div class="pajarito uno"></div>
        <div class="pajarito dos"></div>
        <div class="pajarito tres"></div>
        <div class="mar"></div>
        <div class="arena">
            <div class="letrero-nombre">
                <span>Samuel</span>
            </div>
        </div>
    </div>

    <div class="lienzo">
        <div class="stitch">
            <div class="oreja izquierda"></div>
            <div class="oreja derecha"></div>
            
            <div class="cabeza">
                <div class="parche-ojo izquierda">
                    <div class="ojo-parpadeo">
                        <div class="ojo"><div class="pupila"></div></div>
                    </div>
                </div>
                <div class="parche-ojo derecha">
                    <div class="ojo-parpadeo">
                        <div class="ojo"><div class="pupila"></div></div>
                    </div>
                </div>
                
                <div class="nariz"></div>
                
                <div class="boca"></div>
            </div>
            
            <div class="cuerpo">
                <div class="panza"></div>
                
                <div class="brazo-izquierdo">
                    <div class="antebrazo">
                        <div class="mano"></div>
                    </div>
                </div>
                <div class="brazo-derecho">
                    <div class="antebrazo">
                        <div class="mano"></div>
                    </div>
                </div>

                <div class="pierna-izquierda">
                    <div class="pie">
                        <div class="dedo uno"></div>
                        <div class="dedo dos"></div>
                        <div class="dedo tres"></div>
                    </div>
                </div>
                <div class="pierna-derecha">
                    <div class="pie">
                        <div class="dedo uno"></div>
                        <div class="dedo dos"></div>
                        <div class="dedo tres"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
