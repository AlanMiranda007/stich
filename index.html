<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stitch y las Palmeras de Akemi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="escena-playa">
        <div class="sol"></div>
        <div class="nube uno"></div>
        <div class="nube dos"></div>
        <div class="pajarito uno"></div>
        <div class="pajarito dos"></div>
        
        <div class="palmera">
        <div class="hojas"> 
        <div class="rama" style="--r: -45deg"></div>
        <div class="rama" style="--r: -15deg"></div>
        <div class="rama" style="--r: 15deg"></div>
        <div class="rama" style="--r: 45deg"></div>
        <div class="bigote b1"></div>
        <div class="bigote b2"></div>
        <div class="bigote b3"></div>
    </div>
         <div class="tronco">
         <div class="anillo"></div>
         <div class="anillo"></div>
         <div class="anillo"></div>
         <div class="anillo"></div>
         <div class="anillo"></div>
         <div class="anillo"></div>
     </div>
    </div>

        <div class="mar"></div>
        <div class="arena">
            <h1 class="nombre-akemi">AKEMI</h1>
        </div>
    </div>

    <div class="lienzo">
        <div class="stitch">
            <div class="oreja izquierda"></div>
            <div class="oreja derecha"></div>
            
            <div class="cabeza">
                <div class="parche-ojo izquierda">
                    <div class="ojo-parpadeo">
                        <div class="ojo"><div class="pupila"></div></div>
                    </div>
                </div>
                <div class="parche-ojo derecha">
                    <div class="ojo-parpadeo">
                        <div class="ojo"><div class="pupila"></div></div>
                    </div>
                </div>
                <div class="nariz"></div>
                <div class="boca"></div>
            </div>
            
            <div class="cuerpo">
                <div class="panza"></div>
                <div class="brazo-izquierdo">
                    <div class="antebrazo"><div class="mano"></div></div>
                </div>
                <div class="brazo-derecho">
                    <div class="antebrazo"><div class="mano"></div></div>
                </div>
                <div class="pierna-izquierda">
                    <div class="pie">
                        <div class="dedo uno"></div>
                        <div class="dedo dos"></div>
                        <div class="dedo tres"></div>
                    </div>
                </div>
                <div class="pierna-derecha">
                    <div class="pie">
                        <div class="dedo uno"></div>
                        <div class="dedo dos"></div>
                        <div class="dedo tres"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
