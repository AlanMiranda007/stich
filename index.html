<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Stitch en CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="canvas">
        <div class="stitch">
            <div class="ear left"></div>
            <div class="ear right"></div>
            
            <div class="head">
                <div class="eye-patch left">
                    <div class="eye"><div class="pupil"></div></div>
                </div>
                <div class="eye-patch right">
                    <div class="eye"><div class="pupil"></div></div>
                </div>
                
                <div class="nose"></div>
                
                <div class="mouth"></div>
            </div>
            
            <div class="body">
                <div class="tummy"></div>
            </div>
        </div>
    </div>

</body>
</html>
